<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/english-vocab/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语生词本</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --primary: #4f6ef7;
    --primary-hover: #3b5de7;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111118;
      --surface: #1a1a25;
      --primary: #6b83ff;
      --primary-hover: #5a72ee;
      --text: #e8e8ed;
      --text-secondary: #9ca3af;
      --border: #2a2a38;
      --danger: #f87171;
      --success: #4ade80;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 16px calc(16px + var(--safe-bottom));
    min-height: 100dvh;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header .count {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  .input-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input, textarea, select {
    font-family: inherit;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--primary);
  }

  input::placeholder, textarea::placeholder {
    color: var(--text-secondary);
  }

  textarea {
    resize: vertical;
    min-height: 44px;
    line-height: 1.4;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
    min-height: 44px;
    min-width: 44px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover { background: var(--primary-hover); }

  .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
  }

  .btn-secondary:hover { background: var(--bg); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    padding: 6px 10px;
    min-height: 36px;
  }

  .btn-danger:hover { background: rgba(239,68,68,.08); }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 160px;
    position: relative;
  }

  .search-wrap input {
    padding-left: 36px;
  }

  .search-wrap .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 18px;
    line-height: 1;
    pointer-events: none;
  }

  .filter-wrap {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .filter-wrap select {
    width: auto;
    min-width: 80px;
  }

  .word-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .word-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeIn .25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-card .word-main {
    flex: 1;
    min-width: 0;
  }

  .word-card .word {
    font-size: 17px;
    font-weight: 600;
    word-break: break-word;
  }

  .word-card .meaning {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 1px;
    word-break: break-word;
  }

  .word-card .example {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    padding: 6px 10px;
    background: var(--bg);
    border-radius: 6px;
    line-height: 1.4;
    word-break: break-word;
    font-style: italic;
  }

  .word-card .meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .word-card .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(79,110,247,.1);
    color: var(--primary);
    cursor: pointer;
  }

  .word-card .tag:hover { opacity: .8; }

  .word-card .time {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .word-card .card-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: .5;
  }

  .empty p { font-size: 15px; }

  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .tab-bar button {
    flex: 1;
    background: transparent;
    border: none;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .tab-bar button.active {
    color: var(--primary);
    font-weight: 600;
  }

  .tab-bar button.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 3px;
    background: var(--primary);
    border-radius: 3px 3px 0 0;
  }

  .view-hidden { display: none !important; }

  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tag-select-row {
    display: flex;
    gap: 8px;
  }

  .tag-edit-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    animation: fadeIn .2s ease;
  }

  .tag-edit-modal .modal-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }

  .tag-edit-modal h3 {
    margin-bottom: 12px;
    font-size: 16px;
  }

  .tag-edit-modal .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag-edit-modal .tag-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 14px;
    background: rgba(79,110,247,.1);
    color: var(--primary);
  }

  .tag-edit-modal .tag-item .del-tag {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    opacity: .6;
  }

  .tag-edit-modal .tag-item .del-tag:hover { opacity: 1; }

  .tag-edit-modal .add-tag-row {
    display: flex;
    gap: 6px;
  }

  .tag-edit-modal .add-tag-row input { flex: 1; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all .3s ease;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-color-scheme: dark) {
    .toast {
      background: #e8e8ed;
      color: #111118;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>英语生词本</h1>
    <span class="count" id="count">0 个词</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="exportData()" title="导出数据">↗</button>
    <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()" title="导入数据">↘</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-secondary" onclick="showTagManager()" title="管理分类标签">🏷️</button>
  </div>
</div>

<div class="tab-bar">
  <button class="active" data-tab="add" onclick="switchTab('add')">添加</button>
  <button data-tab="list" onclick="switchTab('list')">词库</button>
  <button data-tab="quiz" onclick="switchTab('quiz')">测验</button>
</div>

<div id="tab-add" class="add-form">
  <div class="input-card">
    <input type="text" id="input-word" placeholder="单词，如 carefully" autocomplete="off">
    <input type="text" id="input-meaning" placeholder="中文释义，如 仔细地" autocomplete="off">
    <textarea id="input-example" rows="2" placeholder="例句（可选）"></textarea>
    <select id="input-tag" title="分类标签"></select>
    <button class="btn btn-primary" onclick="addWord()">＋ 记录生词</button>
  </div>
</div>

<div id="tab-list" class="view-hidden">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="搜索单词或释义…" oninput="renderList()">
    </div>
    <div class="filter-wrap">
      <select id="filter-tag" onchange="renderList()">
        <option value="">全部</option>
      </select>
    </div>
  </div>
  <div class="word-list" id="word-list"></div>
</div>

<div id="tab-quiz" class="view-hidden">
  <div class="input-card" style="display:flex;flex-direction:column;gap:10px;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <select id="quiz-tag" style="flex:1;min-width:100px;" onchange="resetQuiz()">
        <option value="">全部词</option>
      </select>
      <button class="btn btn-primary" onclick="resetQuiz()">开始</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <label style="font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="quiz-meaning-mode" onchange="resetQuiz()"> 看中文拼英文
      </label>
    </div>
  </div>

  <div id="quiz-area" class="view-hidden">
    <div class="input-card" style="text-align:center;padding:32px 16px;">
      <div style="font-size:28px;font-weight:700;margin-bottom:8px;" id="quiz-question"></div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;" id="quiz-progress"></div>

      <div id="quiz-input-area" style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto;">
        <input type="text" id="quiz-answer" placeholder="输入你的答案…" autocomplete="off"
               onkeydown="if(event.key==='Enter')checkQuiz()">
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="btn btn-primary" onclick="checkQuiz()">确认</button>
          <button class="btn btn-secondary" onclick="showQuizAnswer()">显示答案</button>
        </div>
      </div>

      <div id="quiz-result" style="margin-top:16px;font-size:15px;min-height:24px;"></div>
    </div>
  </div>

  <div id="quiz-empty" class="empty">
    <div class="empty-icon">🎯</div>
    <p>没有符合条件的单词，先去词库添加一些吧</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="tag-manager" class="view-hidden tag-edit-modal">
  <div class="modal-card">
    <h3>管理分类标签</h3>
    <div class="tag-list" id="tag-list-manager"></div>
    <div class="add-tag-row">
      <input type="text" id="new-tag-input" placeholder="新标签名称"
             onkeydown="if(event.key==='Enter')addNewTag()">
      <button class="btn btn-primary" onclick="addNewTag()">添加</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTagManager()">完成</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'eng_vocab';
  const TAGS_KEY = 'eng_vocab_tags';
  let words = [];
  let tags = ['副词', '形容词', '动词', '名词', '短语', '其他'];
  let quizQueue = [];
  let quizIndex = 0;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      words = raw ? JSON.parse(raw) : [];
    } catch { words = []; }
    try {
      const raw = localStorage.getItem(TAGS_KEY);
      if (raw) tags = JSON.parse(raw);
    } catch {}
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
    localStorage.setItem(TAGS_KEY, JSON.stringify(tags));
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.getElementById('tab-add').classList.toggle('view-hidden', name !== 'add');
    document.getElementById('tab-list').classList.toggle('view-hidden', name !== 'list');
    document.getElementById('tab-quiz').classList.toggle('view-hidden', name !== 'quiz');
    if (name === 'list') renderList();
    if (name === 'quiz') initQuiz();
  }

  function populateTagSelects() {
    const selects = [document.getElementById('input-tag'), document.getElementById('filter-tag'), document.getElementById('quiz-tag')];
    selects.forEach((sel, idx) => {
      if (!sel) return;
      const current = sel.value;
      sel.innerHTML = '';
      if (idx > 0) {
        const allOpt = document.createElement('option');
        allOpt.value = '';
        allOpt.textContent = idx === 1 ? '全部' : '全部词';
        sel.appendChild(allOpt);
      }
      tags.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });
      if (tags.includes(current)) sel.value = current;
    });
  }

  function addWord() {
    const wordEl = document.getElementById('input-word');
    const meaningEl = document.getElementById('input-meaning');
    const exampleEl = document.getElementById('input-example');
    const tagEl = document.getElementById('input-tag');
    const word = wordEl.value.trim();
    const meaning = meaningEl.value.trim();
    const tag = tagEl.value;

    if (!word) { showToast('请输入单词'); wordEl.focus(); return; }
    if (!meaning) { showToast('请输入中文释义'); meaningEl.focus(); return; }

    words.unshift({
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      word,
      meaning,
      example: exampleEl.value.trim(),
      tag: tag || '其他',
      createdAt: Date.now()
    });

    save();
    wordEl.value = '';
    meaningEl.value = '';
    exampleEl.value = '';
    wordEl.focus();
    updateCount();
    showToast('✅ 已记录 "' + word + '"');
  }

  function deleteWord(id) {
    if (!confirm('确定删除这个词？')) return;
    words = words.filter(w => w.id !== id);
    save();
    renderList();
    updateCount();
    showToast('已删除');
  }

  function renderList() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const ft = document.getElementById('filter-tag').value;
    let filtered = words;
    if (q) {
      filtered = words.filter(w =>
        w.word.toLowerCase().includes(q) ||
        w.meaning.includes(q)
      );
    }
    if (ft) {
      filtered = filtered.filter(w => w.tag === ft);
    }

    const container = document.getElementById('word-list');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📖</div><p>' +
        (words.length === 0 ? '还没有生词，去添加一些吧' : '没有匹配的单词') +
        '</p></div>';
      return;
    }

    container.innerHTML = filtered.map(w => {
      const d = new Date(w.createdAt);
      const dateStr = d.getMonth()+1 + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      const exampleHtml = w.example ? '<div class="example">' + escapeHtml(w.example) + '</div>' : '';
      return '<div class="word-card">' +
        '<div class="word-main">' +
          '<div class="word">' + escapeHtml(w.word) + '</div>' +
          '<div class="meaning">' + escapeHtml(w.meaning) + '</div>' +
          exampleHtml +
          '<div class="meta">' +
            '<span class="tag" onclick="editWordTag(\'' + w.id + '\')" title="点击修改标签">' + escapeHtml(w.tag || '其他') + '</span>' +
            '<span class="time">' + dateStr + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="btn btn-danger" onclick="deleteWord(\'' + w.id + '\')">✕</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function editWordTag(id) {
    const w = words.find(x => x.id === id);
    if (!w) return;
    const newTag = prompt('修改分类标签：', w.tag);
    if (newTag && newTag.trim()) {
      w.tag = newTag.trim();
      if (!tags.includes(w.tag)) {
        tags.push(w.tag);
        populateTagSelects();
      }
      save();
      renderList();
      showToast('已更新');
    }
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function updateCount() {
    document.getElementById('count').textContent = words.length + ' 个词';
  }

  function initQuiz() {
    const ft = document.getElementById('quiz-tag').value;
    let pool = ft ? words.filter(w => w.tag === ft) : words;
    if (pool.length === 0) {
      document.getElementById('quiz-area').classList.add('view-hidden');
      document.getElementById('quiz-empty').classList.remove('view-hidden');
      return;
    }
    document.getElementById('quiz-empty').classList.add('view-hidden');
    document.getElementById('quiz-area').classList.remove('view-hidden');
    if (quizQueue.length === 0) resetQuiz();
  }

  function resetQuiz() {
    const ft = document.getElementById('quiz-tag').value;
    let pool = ft ? words.filter(w => w.tag === ft) : words;
    quizQueue = [...pool].sort(() => Math.random() - 0.5);
    quizIndex = 0;
    document.getElementById('quiz-result').textContent = '';
    document.getElementById('quiz-answer').value = '';
    document.getElementById('quiz-answer').disabled = false;
    document.getElementById('quiz-area').classList.remove('view-hidden');
    if (quizQueue.length === 0) {
      document.getElementById('quiz-empty').classList.remove('view-hidden');
      document.getElementById('quiz-area').classList.add('view-hidden');
      return;
    }
    showQuizCard();
  }

  function showQuizCard() {
    const q = quizQueue[quizIndex];
    if (!q) { resetQuiz(); return; }
    const meaningMode = document.getElementById('quiz-meaning-mode').checked;
    document.getElementById('quiz-question').textContent = meaningMode ? q.meaning : q.word;
    document.getElementById('quiz-progress').textContent = (quizIndex + 1) + ' / ' + quizQueue.length;
    document.getElementById('quiz-answer').value = '';
    document.getElementById('quiz-answer').disabled = false;
    document.getElementById('quiz-answer').focus();
    document.getElementById('quiz-result').textContent = '';
  }

  function checkQuiz() {
    const q = quizQueue[quizIndex];
    if (!q) return;
    const answer = document.getElementById('quiz-answer').value.trim().toLowerCase();
    const meaningMode = document.getElementById('quiz-meaning-mode').checked;
    const resultEl = document.getElementById('quiz-result');

    if (meaningMode) {
      if (answer === q.word.toLowerCase()) {
        resultEl.textContent = '✅ 正确！' + (q.example ? ' 例句：' + q.example : '');
        resultEl.style.color = 'var(--success)';
        advanceQuiz();
      } else {
        resultEl.textContent = '❌ 不对，再想想？';
        resultEl.style.color = 'var(--danger)';
      }
    } else {
      if (answer === q.meaning) {
        resultEl.textContent = '✅ 正确！' + (q.example ? ' 例句：' + q.example : '');
        resultEl.style.color = 'var(--success)';
        advanceQuiz();
      } else {
        resultEl.textContent = '❌ 不对，再想想？';
        resultEl.style.color = 'var(--danger)';
      }
    }
  }

  function advanceQuiz() {
    quizIndex++;
    if (quizIndex >= quizQueue.length) {
      document.getElementById('quiz-result').textContent = '🎉 全部完成！共 ' + quizQueue.length + ' 个词';
      document.getElementById('quiz-result').style.color = 'var(--text)';
      document.getElementById('quiz-answer').disabled = true;
      quizQueue = [];
      return;
    }
    setTimeout(showQuizCard, 600);
  }

  function showQuizAnswer() {
    const q = quizQueue[quizIndex];
    if (!q) return;
    const meaningMode = document.getElementById('quiz-meaning-mode').checked;
    const answer = meaningMode ? q.word : q.meaning;
    document.getElementById('quiz-result').textContent = '💡 ' + (meaningMode ? '英文：' : '释义：') + answer + (q.example ? ' | 例句：' + q.example : '');
    document.getElementById('quiz-result').style.color = 'var(--text)';
    setTimeout(() => { advanceQuiz(); }, 1200);
  }

  function showTagManager() {
    renderTagManager();
    document.getElementById('tag-manager').classList.remove('view-hidden');
    document.getElementById('new-tag-input').value = '';
    document.getElementById('new-tag-input').focus();
  }

  function closeTagManager() {
    document.getElementById('tag-manager').classList.add('view-hidden');
  }

  function renderTagManager() {
    const container = document.getElementById('tag-list-manager');
    container.innerHTML = tags.map(t =>
      '<span class="tag-item">' +
        escapeHtml(t) +
        ' <span class="del-tag" onclick="removeTag(\'' + escapeHtml(t) + '\')">✕</span>' +
      '</span>'
    ).join('');
  }

  function addNewTag() {
    const input = document.getElementById('new-tag-input');
    const name = input.value.trim();
    if (!name) return;
    if (tags.includes(name)) { showToast('标签已存在'); return; }
    tags.push(name);
    save();
    input.value = '';
    renderTagManager();
    populateTagSelects();
    showToast('已添加标签');
  }

  function removeTag(name) {
    if (!confirm('确定删除标签 "' + name + '"？已标记该标签的单词不会删除，但标签会变为"其他"。')) return;
    tags = tags.filter(t => t !== name);
    words.forEach(w => { if (w.tag === name) w.tag = '其他'; });
    save();
    renderTagManager();
    populateTagSelects();
    renderList();
    showToast('已删除标签');
  }

  function exportData() {
    const data = JSON.stringify({ words, tags, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '英语生词本_' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ 已导出 ' + words.length + ' 个词');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.words) throw new Error('无效格式');
        const existingIds = new Set(words.map(w => w.id));
        let added = 0;
        data.words.forEach(w => {
          if (!existingIds.has(w.id)) {
            words.push(w);
            existingIds.add(w.id);
            added++;
          }
        });
        if (data.tags) {
          data.tags.forEach(t => { if (!tags.includes(t)) tags.push(t); });
        }
        save();
        populateTagSelects();
        renderList();
        updateCount();
        showToast('✅ 导入完成，新增 ' + added + ' 个词');
      } catch(err) {
        showToast('❌ 导入失败，文件格式不正确');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  load();
  populateTagSelects();
  updateCount();
  renderList();
</script>

</body>
</html>
