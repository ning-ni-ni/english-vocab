<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>英语生词本</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;font-size:16px;line-height:1.5;background:#f5f5f5;color:#1a1a2e;max-width:600px;margin:0 auto;padding:16px;min-height:100dvh}
@media(prefers-color-scheme:dark){body{background:#111118;color:#e8e8ed}}
.wrap{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
@media(prefers-color-scheme:dark){.wrap{background:#1a1a25}}
.row{display:flex;gap:8px;align-items:center}
.row input{flex:1;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;outline:none;background:#f5f5f5;color:#1a1a2e;font-family:inherit}
.row input:focus{border-color:#4f6ef7}
@media(prefers-color-scheme:dark){.row input{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
.row select{flex:0;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#f5f5f5;color:#1a1a2e;font-family:inherit}
@media(prefers-color-scheme:dark){.row select{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
button{padding:10px 18px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;white-space:nowrap}
button:active{transform:scale(0.97)}
.pri{background:#4f6ef7;color:#fff}.pri:hover{background:#3b5de7}
.sec{background:transparent;color:#6b7280;border:1.5px solid #e5e7eb}
@media(prefers-color-scheme:dark){.sec{color:#9ca3af;border-color:#2a2a38}}
.sm{padding:6px 10px;min-height:36px;font-size:13px}
.w100{width:100%}
#dbg{display:none;background:#ff8;color:#000;padding:8px;font-size:13px;white-space:pre-wrap;border-radius:6px;margin-bottom:8px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:100}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#4f6ef7;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
#ld{display:none;text-align:center;padding:32px}
#err{display:none;text-align:center;padding:24px;color:#6b7280}
#res{display:none}.rw{font-size:24px;font-weight:700}
.rp{font-size:14px;color:#6b7280;margin-bottom:8px}
.rt{display:inline-block;font-size:12px;padding:3px 10px;border-radius:10px;background:#eef;color:#4f6ef7;margin-bottom:12px}
.sep{border-top:1px solid #e5e7eb;padding:12px 0}
@media(prefers-color-scheme:dark){.sep{border-color:#2a2a38}}
.lb{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px}
.df{padding:6px 0;font-size:13px;color:#6b7280;line-height:1.5}
.ex{padding:8px 10px;background:#f5f5f5;border-radius:6px;margin-bottom:6px;line-height:1.5}
@media(prefers-color-scheme:dark){.ex{background:#111118}}
.ex .en{font-size:14px;font-style:italic}.ex .cn{font-size:13px;color:#6b7280;margin-top:2px}
.mi{padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;font-weight:500;outline:none;width:100%;margin-top:4px;background:#f5f5f5;color:#1a1a2e;font-family:inherit}
.mi:focus{border-color:#4f6ef7}
@media(prefers-color-scheme:dark){.mi{background:#111118;border-color:#2a2a38;color:#e8e8ed}}
.sr{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.sr button{flex:1;min-width:100px}
.svr{display:flex;gap:8px;padding-top:12px;border-top:1px solid #e5e7eb}.svr button{flex:1}
.tab-bar{display:flex;margin-bottom:16px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
@media(prefers-color-scheme:dark){.tab-bar{background:#1a1a25}}
.tab-bar button{flex:1;background:transparent;border:none;padding:12px;color:#6b7280;cursor:pointer;position:relative}
.tab-bar button.active{color:#4f6ef7;font-weight:600}
.tab-bar button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#4f6ef7;border-radius:3px 3px 0 0}
.tc{display:block}.tc.vh{display:none!important}
.wl{display:flex;flex-direction:column;gap:8px}
.wc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px}
@media(prefers-color-scheme:dark){.wc{background:#1a1a25}}
.wc .wm{flex:1;min-width:0}
.wc-w{font-size:17px;font-weight:600;word-break:break-word}
.wc-p{font-size:13px;color:#6b7280;font-weight:400}.wc-m{font-size:14px;color:#6b7280;margin-top:1px}
.wc-e{font-size:13px;margin-top:6px;padding:6px 10px;background:#f5f5f5;border-radius:6px;font-style:italic}
@media(prefers-color-scheme:dark){.wc-e{background:#111118}}
.wc-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.wc-t{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(79,110,247,.1);color:#4f6ef7}
.wc-time{font-size:11px;color:#6b7280}
#tmodal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200}
#tmodal .bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4)}
#tmodal .cd{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:10px;padding:20px;width:90%;max-width:400px;z-index:1}
@media(prefers-color-scheme:dark){#tmodal .cd{background:#1a1a25}}
</style>
</head>
<body>

<div id="toast"></div>
<div class="row" style="justify-content:space-between;margin-bottom:12px">
  <h1>英语生词本 <span id="cnt" style="font-size:14px;color:#6b7280;font-weight:400">0 个词</span></h1>
  <div style="display:flex;gap:4px">
    <button class="sec sm" id="btn-export">↗</button>
    <button class="sec sm" id="btn-import">↘</button>
    <button class="sec sm" id="btn-tags">🏷</button><button class="sec sm" id="btn-share">🔄</button>
    <input type="file" id="impf" accept=".json" style="display:none">
  </div>
</div>

<div class="tab-bar">
  <button class="active" data-tab="add">添加</button>
  <button data-tab="list">词库</button>
  <button data-tab="quiz">测验</button>
</div>

<div id="tab-add" class="tc">
  <div class="wrap" style="gap:8px">
    <div class="row">
      <input type="text" id="iw" placeholder="输入英语单词..." autocomplete="off">
      <button class="pri" id="btnlk">🔍</button>
    </div>
  </div>
  <div class="wrap" id="ld"><div class="spinner"></div><div style="margin-top:8px;color:#6b7280;font-size:14px">查询中...</div></div>
  <div class="wrap" id="err"><div style="font-size:36px;margin-bottom:8px">😕</div><div id="errt" style="font-size:14px;color:#6b7280"></div></div>
  <div id="res">
    <div class="wrap">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="rw" id="rw"></div><div class="rp" id="rp"></div></div>
        <div style="display:flex;gap:6px">
          <button class="sec sm" id="sgb">🇬🇧</button>
          <button class="sec sm" id="sus">🇺🇸</button>
        </div>
      </div>
      <div><span class="rt" id="rpos"></span></div>
      <div class="sep"><div class="lb">📖 含义</div>
        <input class="mi" id="mi" placeholder="中文释义...">
        <div class="df" id="defs"></div>
      </div>
      <div class="sep"><div class="lb">💬 用法</div><div id="exs"></div></div>
      <div class="sep"><div class="lb">🔊 发音</div>
        <div class="sr"><button class="sec" id="sgb2">🇬🇧 英式</button><button class="sec" id="sus2">🇺🇸 美式</button></div>
      </div>
      <div class="svr">
        <select id="tsel" style="padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#f5f5f5;color:#1a1a2e;font-family:inherit"><option>其他</option></select>
        <button class="pri" id="sav">＋ 记录</button>
      </div>
    </div>
  </div>
</div>

<div id="tab-list" class="tc vh">
  <div class="wrap"><div class="row" style="margin-bottom:8px">
    <input type="text" id="sw" placeholder="搜索单词..." autocomplete="off">
    <select id="ft" style="width:auto;padding:8px"><option value="">全部</option></select>
  </div></div>
  <div class="wl" id="wl"></div>
</div>
</div>
<div id="tab-quiz" class="tc vh">
  <div class="wrap"><div class="row" style="margin-bottom:8px">
    <select id="qt" style="flex:1"><option value="">全部词</option></select>
    <button class="pri sm" id="qstart">开始</button>
  </div>
  <label style="font-size:13px;color:#6b7280"><input type="checkbox" id="qmode"> 看中文拼英文</label></div>
  <div class="wrap" id="qc" style="text-align:center;display:none">
    <div style="font-size:28px;font-weight:700;margin-bottom:8px" id="qq"></div>
    <div id="qi" style="color:#6b7280;margin-bottom:16px;font-size:13px"></div>
    <div class="row" style="max-width:320px;margin:0 auto">
      <input type="text" id="qa" placeholder="输入答案..." autocomplete="off">
      <button class="pri sm" id="qchk">确认</button>
      <button class="sec sm" id="qans">答案</button>
    </div>
    <div id="qr" style="margin-top:12px;font-size:15px;min-height:24px"></div>
  </div>
  <div id="qe" style="display:none;text-align:center;padding:60px 20px;color:#6b7280"><p>还没有单词，先去添加吧</p></div>
</div>

<div id="tmodal">
  <div class="bg" onclick="closeTM()"></div>
  <div class="cd">
    <h3 style="margin-bottom:12px">管理标签</h3>
    <div id="tg" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div>
    <div class="row"><input type="text" id="nti" placeholder="新标签名称"><button class="pri sm" onclick="addNT()">添加</button></div>
    <button class="sec w100" style="margin-top:12px" onclick="closeTM()">完成</button>
  </div>
</div>

<script>
var D=document.getElementById("dbg");
function d(m){}
window.onerror=function(m,u,l){d("ERR: "+m+" ("+u+":"+l+")")};d("Loaded");
var SK="eng_voc",TK="eng_voc_tags",words=[],tags=["副词","形容词","动词","名词","短语","其他"];var GH="",GHOWNER="ning-ni-ni",GHREPO="english-vocab",GHFILE="vocab-data.json";
function S(){localStorage.setItem(SK,JSON.stringify(words));localStorage.setItem(TK,JSON.stringify(tags))}
function L(){try{var r=localStorage.getItem(SK);words=r?JSON.parse(r):[]}catch(e){}try{var r=localStorage.getItem(TK);if(r)tags=JSON.parse(r)}catch(e){}syncPull()}
function UC(){var e=document.getElementById("cnt");if(e)e.textContent=words.length+" 个词"}
function TM(s){var e=document.getElementById("toast");if(e){e.textContent=s;e.style.opacity="1";clearTimeout(e._t);e._t=setTimeout(function(){e.style.opacity="0"},1800)}}
function popTS(){["ft","qt"].forEach(function(id,i){var s=document.getElementById(id);if(!s)return;var c=s.value;s.innerHTML='<option value="">'+(i?"全部词":"全部")+"</option>";tags.forEach(function(t){var o=document.createElement("option");o.value=t;o.textContent=t;s.appendChild(o)});if(tags.includes(c))s.value=c})}
function esc(s){var d2=document.createElement("div");d2.textContent=s;return d2.innerHTML}
async function syncPull(){try{var r=await fetch("https://raw.githubusercontent.com/"+GHOWNER+"/"+GHREPO+"/main/"+GHFILE);if(!r.ok)return;var d=await r.json();if(!d.words)return;var ids={};words.forEach(function(w){ids[w.id]=1});var a=0;d.words.forEach(function(w){if(!ids[w.id]){words.push(w);ids[w.id]=1;a++}});if(d.tags)d.tags.forEach(function(t){if(!tags.includes(t))tags.push(t)});if(a>0){S()}}catch(e){}}
function syncShare(){var d=JSON.stringify({words:words,tags:tags,version:2},null,2);if(navigator.share){navigator.share({title:"生词本数据",text:"我的英语生词本",files:[new File([d],"vocab.json",{type:"application/json"})]}).catch(function(){})}else{var a=document.createElement("a");a.href="data:application/json,"+encodeURIComponent(d);a.download="vocab_"+new Date().toISOString().slice(0,10)+".json";a.click()}}
};

async function LW(w){d("lookup: "+w);document.getElementById("err").style.display="none";document.getElementById("res").style.display="none";document.getElementById("ld").style.display="block";try{var dr=await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(w));if(!dr.ok)throw Error("nf");var dd=await dr.json();d("OK: "+dd[0].word);var e=dd[0],ph=e.phonetic||"",mn=e.meanings||[];var cn="";try{var tr=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(w)+"&langpair=en|zh-CN");var td=await tr.json();cn=td.responseData?td.responseData.translatedText:"";if(cn&&!/[\u4e00-\u9fff]/.test(cn))cn=""}catch(e){}var dfs=[],exs=[],pp="";mn.forEach(function(m){if(!pp)pp=m.partOfSpeech;m.definitions.forEach(function(d){dfs.push({pos:m.partOfSpeech,text:d.definition});if(d.example&&exs.length<3)exs.push({pos:m.partOfSpeech,text:d.example,cn:""})})});for(var i=0;i<exs.length;i++){try{var t2=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(exs[i].text)+"&langpair=en|zh-CN");var td2=await t2.json();exs[i].cn=td2.responseData?td2.responseData.translatedText:"";if(exs[i].cn&&!/[\u4e00-\u9fff]/.test(exs[i].cn))exs[i].cn=""}catch(e){}}document.getElementById("rw").textContent=w;document.getElementById("rp").textContent=ph||"";document.getElementById("rpos").textContent=pp||"";document.getElementById("mi").value=cn||"";var dc=document.getElementById("defs");dc.innerHTML=dfs.length?dfs.slice(0,2).map(function(d){return"<b>"+d.pos+"</b> "+esc(d.text)}).join("<br>"):"";var ec=document.getElementById("exs");ec.innerHTML=exs.length?exs.map(function(x){return'<div class="ex"><div class="en">'+esc(x.text)+"</div>"+(x.cn?'<div class="cn">'+esc(x.cn)+"</div>":"")+"</div>"}).join(""):'<div style="font-size:13px;color:#6b7280;padding:4px 0">暂未找到例句</div>';window._lk={word:w,phonetic:ph,pos:pp,defs:dfs,examples:exs};var pm={adverb:"副词",adjective:"形容词",verb:"动词",noun:"名词",phrase:"短语"};var sg=pm[pp]||"其他";var ts=document.getElementById("tsel");if(tags.includes(sg))ts.value=sg;document.getElementById("res").style.display="block"}catch(e){d("Err: "+e.message);document.getElementById("errt").textContent=e.message==="nf"?"没找到这个词":"查询失败";document.getElementById("err").style.display="block"}document.getElementById("ld").style.display="none"}

// Speech
function speak(accent){var w=document.getElementById("rw").textContent||(window._lk&&window._lk.word);if(!w||!window.speechSynthesis)return;window.speechSynthesis.cancel();window.speechSynthesis.speak(new SpeechSynthesisUtterance(" "));window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang=accent;u.rate=0.9;window.speechSynthesis.speak(u)}
for(var _b of["sgb","sus","sgb2","sus2"]){var _el=document.getElementById(_b);if(_el)_el.onclick=function(){speak(this.id.indexOf("gb")>=0?"en-GB":"en-US")}}

// Save
document.getElementById("sav").onclick=function(){var w=document.getElementById("rw").textContent,m=document.getElementById("mi").value.trim();if(!w||!m){TM("请先查词");return}var lk=window._lk;if(lk&&lk.word===w){var ex=lk.examples||[];words.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:lk.phonetic||"",pos:lk.pos||"",tag:document.getElementById("tsel").value,examples:ex.map(function(e){return{text:e.text,cn:e.cn||""}}),createdAt:Date.now()})}else{words.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:"",pos:"",tag:document.getElementById("tsel").value,examples:[],createdAt:Date.now()})}S();document.getElementById("iw").value="";document.getElementById("res").style.display="none";document.getElementById("mi").value="";document.getElementById("rw").textContent="";UC();TM("已保存")}

// Word list - uses data-id on card + event delegation
function RL(){var el=document.getElementById("sw");if(!el)return;var q=el.value.trim().toLowerCase(),fl=document.getElementById("ft"),fv=fl?fl.value:"";var f=words;if(q)f=words.filter(function(w){return w.word.toLowerCase().includes(q)||w.meaning.includes(q)});if(fv)f=f.filter(function(w){return w.tag===fv});var c=document.getElementById("wl");if(!c)return;if(!f.length){c.innerHTML='<div style="text-align:center;padding:60px;color:#6b7280"><p>'+(words.length?"无匹配":"无生词")+"</p></div>";return}c.innerHTML=f.map(function(w){var d2=new Date(w.createdAt),ds=(d2.getMonth()+1)+"/"+d2.getDate()+" "+String(d2.getHours()).padStart(2,"0")+":"+String(d2.getMinutes()).padStart(2,"0");var pr=w.phonetic?" <span class=\"wc-p\">"+esc(w.phonetic)+"</span>":"";var ex="";if(w.examples&&w.examples.length)ex='<div class="wc-e">'+esc(w.examples[0].text)+(w.examples[0].cn?"<br>"+esc(w.examples[0].cn):"")+"</div>";return '<div class="wc" data-id="'+w.id+'"><div class="wm"><div class="wc-w">'+esc(w.word)+pr+'</div><div class="wc-m">'+esc(w.meaning)+"</div>"+ex+'<div class="wc-meta"><span class="wc-t">'+esc(w.tag||"其他")+'</span><span class="wc-time">'+ds+"</span></div></div><button class=\"sec sm\" data-action=\"delete\">X</button></div>"}).join("")}
document.getElementById("sw").oninput=RL;document.getElementById("ft").onchange=RL;

// Event delegation for word list (delete + tag edit)
document.getElementById("wl").onclick=function(e){var t=e.target;var c=t.closest("[data-id]");if(!c)return;var id=c.getAttribute("data-id");if(t.getAttribute("data-action")==="delete"){if(!confirm("删除?"))return;words=words.filter(function(w){return w.id!==id});S();RL();UC()}else if(t.classList.contains("wc-t")){var w=words.find(function(x){return x.id===id});if(!w)return;var nt=prompt("标签:",w.tag);if(nt&&nt.trim()){w.tag=nt.trim();if(!tags.includes(w.tag)){tags.push(w.tag);popTS()}S();RL()}}};

// Quiz
var _qq=[],_qi=0;
function IQ(){var el=document.getElementById("qt");if(!el)return;var ft=el.value,p=ft?words.filter(function(w){return w.tag===ft}):words;if(!p.length){document.getElementById("qc").style.display="none";document.getElementById("qe").style.display="block";return}document.getElementById("qe").style.display="none";document.getElementById("qc").style.display="block";if(!_qq.length)RQ()}
document.getElementById("qstart").onclick=RQ;document.getElementById("qmode").onchange=RQ;
function RQ(){var el=document.getElementById("qt");if(!el)return;var ft=el.value,p=ft?words.filter(function(w){return w.tag===ft}):words;_qq=[].concat(p).sort(function(){return Math.random()-0.5});_qi=0;document.getElementById("qr").textContent="";var qa=document.getElementById("qa");if(qa){qa.value="";qa.disabled=false}if(!_qq.length){document.getElementById("qe").style.display="block";document.getElementById("qc").style.display="none";return}showQ()}
function showQ(){var q=_qq[_qi];if(!q)return;var mm=document.getElementById("qmode")?document.getElementById("qmode").checked:false;document.getElementById("qq").textContent=mm?q.meaning:q.word;document.getElementById("qi").textContent=(_qi+1)+"/"+_qq.length+(q.phonetic&&!mm?" "+q.phonetic:"");var qa=document.getElementById("qa");if(qa){qa.value="";qa.disabled=false;qa.focus()}document.getElementById("qr").textContent=""}
document.getElementById("qchk").onclick=ck;document.getElementById("qa").onkeydown=function(e){if(e.key==="Enter")ck()};
function ck(){var q=_qq[_qi];if(!q)return;var a=document.getElementById("qa");var a2=a?a.value.trim().toLowerCase():"";var mm=document.getElementById("qmode")?document.getElementById("qmode").checked:false;var re=document.getElementById("qr");if(!re)return;if(mm?a2===q.word.toLowerCase():a2===q.meaning){re.textContent="✓ "+(q.examples&&q.examples[0]?q.examples[0].text:"");re.style.color="green";advQ()}else{re.textContent="✗";re.style.color="red"}}
function advQ(){_qi++;if(_qi>=_qq.length){document.getElementById("qr").textContent="★ 完成!";document.getElementById("qa").disabled=true;_qq=[];return}setTimeout(showQ,600)}
document.getElementById("qans").onclick=function(){var q=_qq[_qi];if(!q)return;var mm=document.getElementById("qmode")?document.getElementById("qmode").checked:false;var a=mm?q.word:q.meaning;var ex=q.examples&&q.examples[0]?" | "+q.examples[0].text:"";var re=document.getElementById("qr");if(re)re.textContent="> "+(mm?"英文: ":"释义: ")+a+ex;setTimeout(function(){advQ()},1200)}

// Tags
function openTM(){document.getElementById("tmodal").style.display="block";var tg=document.getElementById("tg");if(tg)tg.innerHTML=tags.map(function(t){return'<span style="display:inline-flex;gap:4px;font-size:13px;padding:4px 10px;border-radius:14px;background:rgba(79,110,247,.1);color:#4f6ef7">'+esc(t)+" <span style=\"cursor:pointer\" id=\"deltag_"+esc(t).replace(/\s/g,"_")+'">✕</span></span>'}).join("");if(tg)tg.onclick=function(e){if(e.target.id&&e.target.id.indexOf("deltag_")===0){var n=e.target.parentNode.textContent.slice(0,-1);if(!confirm("删除标签?"))return;tags=tags.filter(function(t){return t!==n});words.forEach(function(w){if(w.tag===n)w.tag="其他"});S();popTS();RL();openTM()}};document.getElementById("nti").value="";document.getElementById("nti").focus()}
function closeTM(){document.getElementById("tmodal").style.display="none"}
function addNT(){var inp=document.getElementById("nti");if(!inp)return;var n=inp.value.trim();if(!n||tags.includes(n))return;tags.push(n);S();inp.value="";popTS();openTM()}

// Export/Import
document.getElementById("btn-export").onclick=function(){var d=JSON.stringify({words:words,tags:tags},null,2);var b=new Blob([d],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="生词本_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);TM("已导出")}
document.getElementById("btn-import").onclick=function(){document.getElementById("impf").click()}
document.getElementById("btn-tags").onclick=openTM;document.getElementById("btn-share").onclick=syncShare;
document.getElementById("impf").onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.words)throw Error();var ids={};words.forEach(function(w){ids[w.id]=1});var n=0;d.words.forEach(function(w){if(!ids[w.id]){words.push(w);ids[w.id]=1;n++}});if(d.tags)d.tags.forEach(function(t){if(!tags.includes(t))tags.push(t)});S();popTS();RL();UC();TM("导入 "+n)}catch(ex){TM("失败")}};r.readAsText(f)}

L();popTS();UC();d("Ready");
</script>
