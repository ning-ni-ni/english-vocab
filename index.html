<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语生词本</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;font-size:16px;line-height:1.5;background:#f5f5f5;color:#1a1a2e;max-width:600px;margin:0 auto;padding:16px;min-height:100dvh}
  @media(prefers-color-scheme:dark){body{background:#111118;color:#e8e8ed}}
  .wrap{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
  @media(prefers-color-scheme:dark){.wrap{background:#1a1a25;box-shadow:0 1px 3px rgba(0,0,0,.3)}}
  h1{font-size:20px;margin-bottom:8px}
  .row{display:flex;gap:8px}
  .row input{flex:1;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;outline:none;width:100%;background:#f5f5f5;color:#1a1a2e;font-family:inherit}
  .row input:focus{border-color:#4f6ef7}
  @media(prefers-color-scheme:dark){.row input{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
  button{padding:10px 18px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;white-space:nowrap}
  button.primary{background:#4f6ef7;color:#fff}
  button.secondary{background:transparent;color:#6b7280;border:1.5px solid #e5e7eb}
  @media(prefers-color-scheme:dark){button.secondary{color:#9ca3af;border-color:#2a2a38}}
  button:active{transform:scale(0.97)}
  #dbg{display:none;background:#ffe;color:#000;padding:8px;font-size:13px;white-space:pre-wrap;border-radius:6px;margin-bottom:8px}
  #loading{display:none;text-align:center;padding:32px}
  #error{display:none;text-align:center;padding:24px;color:#6b7280}
  #error .icon{font-size:36px;margin-bottom:8px}
  #result{display:none;margin-top:12px}
  #result .word{font-size:24px;font-weight:700;margin-bottom:4px}
  #result .phonetic{font-size:14px;color:#6b7280;margin-bottom:8px}
  #result .pos{display:inline-block;font-size:12px;padding:3px 10px;border-radius:10px;background:#eef;color:#4f6ef7;margin-bottom:12px}
  #result .section{border-top:1px solid #e5e7eb;padding:12px 0}
  @media(prefers-color-scheme:dark){#result .section{border-color:#2a2a38}}
  #result .label{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px}
  #result .def{padding:6px 0;font-size:13px;color:#6b7280;line-height:1.5}
  #result .def .pos-label{color:#4f6ef7;font-weight:500;font-size:11px}
  #result .example{padding:8px 10px;background:#f5f5f5;border-radius:6px;margin-bottom:6px;line-height:1.5}
  @media(prefers-color-scheme:dark){#result .example{background:#111118}}
  #result .example .en{font-size:14px;font-style:italic}
  #result .example .cn{font-size:13px;color:#6b7280;margin-top:2px}
  .say-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .say-row button{flex:1;min-width:100px;font-size:14px}
  #meaning-input{padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;font-weight:500;outline:none;width:100%;background:#f5f5f5;color:#1a1a2e;font-family:inherit;margin-top:4px}
  #meaning-input:focus{border-color:#4f6ef7}
  @media(prefers-color-scheme:dark){#meaning-input{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
  #result .save-row{display:flex;gap:8px;border-top:1px solid #e5e7eb;padding-top:12px}
  @media(prefers-color-scheme:dark){#result .save-row{border-color:#2a2a38}}
  #result .save-row button{flex:1}
  #result .save-row select{flex:0 0 auto;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#f5f5f5;color:#1a1a2e}
  @media(prefers-color-scheme:dark){#result .save-row select{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
.tab-bar{display:flex;margin-bottom:16px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}@media(prefers-color-scheme:dark){.tab-bar{background:#1a1a25}}.tab-bar button{flex:1;background:transparent;border:none;padding:12px;color:#6b7280;cursor:pointer;position:relative}.tab-bar button.active{color:#4f6ef7;font-weight:600}.tab-bar button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#4f6ef7}.tc{display:block}.tc.vh{display:none!important}.wl{display:flex;flex-direction:column;gap:8px}.wc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px}@media(prefers-color-scheme:dark){.wc{background:#1a1a25}}.wc .wm{flex:1;min-width:0}.wc-w{font-size:17px;font-weight:600}.wc-p{font-size:13px;color:#6b7280}.wc-m{font-size:14px;color:#6b7280;margin-top:1px}.wc-e{font-size:13px;margin-top:6px;padding:6px 10px;background:#f5f5f5;border-radius:6px;font-style:italic}@media(prefers-color-scheme:dark){.wc-e{background:#111118}}.wc-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}.wc-t{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(79,110,247,.1);color:#4f6ef7;cursor:pointer}.wc-time{font-size:11px;color:#6b7280}</style>
</head>
<body>

<div id="dbg"></div>
<h1>英语生词本 <span id="count" style="font-size:14px;color:#6b7280;font-weight:400">0 个词</span></h1>

<div class="tab-bar">
<button class="active" data-tab="add">添加</button>
<button data-tab="list">词库</button>
<button data-tab="quiz">测验</button>
</div><div id="tab-add" class="tc"><div class="wrap" style="gap:8px">
  <div class="row">
    <input type="text" id="input-word" placeholder="输入英语单词..." autocomplete="off">
    <button class="primary" id="btn-lookup">🔍</button>
  </div>
</div>

<div id="loading" class="wrap">
  <div style="width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#4f6ef7;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto"></div>
  <div style="margin-top:8px;color:#6b7280;font-size:14px">正在查询...</div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}.tab-bar{display:flex;margin-bottom:16px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}@media(prefers-color-scheme:dark){.tab-bar{background:#1a1a25}}.tab-bar button{flex:1;background:transparent;border:none;padding:12px;color:#6b7280;cursor:pointer;position:relative}.tab-bar button.active{color:#4f6ef7;font-weight:600}.tab-bar button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#4f6ef7}.tc{display:block}.tc.vh{display:none!important}.wl{display:flex;flex-direction:column;gap:8px}.wc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px}@media(prefers-color-scheme:dark){.wc{background:#1a1a25}}.wc .wm{flex:1;min-width:0}.wc-w{font-size:17px;font-weight:600}.wc-p{font-size:13px;color:#6b7280}.wc-m{font-size:14px;color:#6b7280;margin-top:1px}.wc-e{font-size:13px;margin-top:6px;padding:6px 10px;background:#f5f5f5;border-radius:6px;font-style:italic}@media(prefers-color-scheme:dark){.wc-e{background:#111118}}.wc-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}.wc-t{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(79,110,247,.1);color:#4f6ef7;cursor:pointer}.wc-time{font-size:11px;color:#6b7280}</style>

<div id="error" class="wrap">
  <div class="icon">😕</div>
  <div id="error-text"></div>
</div>

<div id="result">
  <div class="wrap">
    <div id="result-word" class="word"></div>
    <div id="result-phonetic" class="phonetic"></div>
    <div id="result-pos" class="pos"></div>

    <div class="section">
      <div class="label">📖 含义 · 掌握什么</div>
      <input type="text" id="meaning-input" placeholder="中文释义...">
      <div id="def-container" class="def" style="margin-top:6px"></div>
    </div>

    <div class="section">
      <div class="label">💬 用法 · 如何应用</div>
      <div id="example-container"></div>
    </div>

    <div class="section">
      <div class="label">🔊 发音 · 如何说</div>
      <div class="say-row">
        <button class="secondary" id="btn-sound-gb">🇬🇧 英式发音</button>
        <button class="secondary" id="btn-sound-us">🇺🇸 美式发音</button>
      </div>
    </div>

    <div class="save-row">
      <select id="result-tag"><option>其他</option></select>
      <button class="primary" id="btn-save">＋ 记录生词</button>
    </div>
  </div>
</div>

<div id="status"></div>

</div><script>

var SK='eng_voc',TK='eng_voc_tags',words=[],tags=['師词','形容词','动词','名词','短语','其他'];
function S(){localStorage.setItem(SK,JSON.stringify(words));localStorage.setItem(TK,JSON.stringify(tags))}
function L(){try{var r=localStorage.getItem(SK);words=r?JSON.parse(r):[]}catch(e){}try{var r=localStorage.getItem(TK);if(r)tags=JSON.parse(r)}catch(e){}}
function UC(){var e=document.getElementById('cnt');if(e)e.textContent=words.length+'个词'}
function TM(s){var e=document.getElementById('toast');e.textContent=s;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show')},1800)}
function popTS(){['ft','qt'].forEach(function(id,i){var s=document.getElementById(id);if(!s)return;var c=s.value;s.innerHTML='<option value="">'+(i===0?'全部':'全部词')+'</option>';tags.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o)});if(tags.includes(c))s.value=c})}

var dbg = document.getElementById("dbg");
function d(m){dbg.style.display="block";dbg.innerHTML+=new Date().toLocaleTimeString()+": "+m+"<br>"}
window.onerror=function(m,u,l){d("ERR: "+m+" ("+u+":"+l+")")}
d("Page loaded");

// Lookup
document.getElementById("btn-lookup").onclick = function() {
  var w = document.getElementById("input-word").value.trim().toLowerCase();
  d("Click: '" + w + "'");
  if (!w) return;
  lookupWord(w);
};

document.getElementById("input-word").oninput = function() {
  clearTimeout(window._timer);
  var v = this.value.trim();
  if (v.length < 2) return;
  window._timer = setTimeout(function() { lookupWord(v); }, 400);
};

async function lookupWord(w) {
  d("lookup: " + w);
  document.getElementById("error").style.display = "none";
  document.getElementById("result").style.display = "none";
  document.getElementById("loading").style.display = "block";

  try {
    d("Fetching dict API...");
    var dr = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(w));
    if (!dr.ok) throw new Error("not_found");
    var dd = await dr.json();
    d("Dict API OK: " + dd[0].word);
    var entry = dd[0];
    var ph = entry.phonetic || (entry.phonetics && entry.phonetics[0] && entry.phonetics[0].text) || "";
    var meanings = entry.meanings || [];

    d("Translating...");
    var cn = "";
    try {
      var tr = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(w) + "&langpair=en|zh-CN");
      var td = await tr.json();
      cn = td.responseData ? td.responseData.translatedText : "";
    } catch(e) { d("Trans err: " + e.message); }

    var defs = [];
    var exs = [];
    var pp = "";
    meanings.forEach(function(m) {
      if (!pp) pp = m.partOfSpeech;
      m.definitions.forEach(function(d) {
        defs.push({pos: m.partOfSpeech, text: d.definition});
        if (d.example && exs.length < 3) exs.push({pos: m.partOfSpeech, text: d.example, cn: ""});
      });
    });

    // Translate examples
    for (var i = 0; i < exs.length; i++) {
      try {
        var tr2 = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(exs[i].text) + "&langpair=en|zh-CN");
        var td2 = await tr2.json();
        exs[i].cn = td2.responseData ? td2.responseData.translatedText : "";
      } catch(e) {}
    }

    d("Displaying result");
    document.getElementById("result-word").textContent = w;
    document.getElementById("result-phonetic").textContent = ph || "";
    document.getElementById("result-pos").textContent = pp || "";
    document.getElementById("meaning-input").value = cn || "";

    // Definitions
    var dc = document.getElementById("def-container");
    if (defs.length) {
      dc.innerHTML = defs.slice(0,2).map(function(d) {
        return '<span style="color:#4f6ef7;font-weight:500;font-size:11px">' + d.pos + '</span> ' + esc(d.text);
      }).join("<br>");
    } else { dc.innerHTML = ""; }

    // Examples
    var ec = document.getElementById("example-container");
    if (exs.length) {
      ec.innerHTML = exs.map(function(x) {
        return '<div class="example"><div class="en">' + esc(x.text) + '</div>' + (x.cn ? '<div class="cn">' + esc(x.cn) + '</div>' : "") + '</div>';
      }).join("");
    } else {
      ec.innerHTML = '<div style="font-size:13px;color:#6b7280;padding:4px 0">暂未找到例句</div>';
    }

    window._lookup = {word: w, phonetic: ph, pos: pp, defs: defs, examples: exs};
    document.getElementById("result").style.display = "block";
    d("Done");
  } catch(e) {
    d("Error: " + e.message);
    document.getElementById("error-text").textContent = e.message === "not_found" ? "没找到这个单词，试试检查拼写" : "查询出错: " + e.message;
    document.getElementById("error").style.display = "block";
  }
  document.getElementById("loading").style.display = "none";
}

// Speech
document.getElementById("btn-sound-gb").onclick = function() { speakWord("en-GB"); };
document.getElementById("btn-sound-us").onclick = function() { speakWord("en-US"); };

function speakWord(accent) {
  var w = document.getElementById("result-word").textContent || (window._lookup && window._lookup.word);
  if (!w || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);
  u.lang = accent;
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// Save
document.getElementById('btn-save').onclick = function(){var w=document.getElementById('result-word').textContent,m=document.getElementById('meaning-input').value.trim();if(!w||!m){return}var lk=window._lk;if(lk&&lk.word===w){var ex=lk.examples||[];words.unshift({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:lk.phonetic||'',pos:lk.pos||'',tag:'其他',examples:ex.map(function(e){return{text:e.text,cn:e.cn||''}}),createdAt:Date.now()})}else{words.unshift({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:'',pos:'',tag:'其他',examples:[],createdAt:Date.now()})}S();document.getElementById('iw').value='';document.getElementById('res').style.display='none';document.getElementById('meaning-input').value='';document.getElementById('result-word').textContent='';UC();TM('已保存')}

function esc(s) {
  var d2 = document.createElement("div");
  d2.textContent = s;
  return d2.innerHTML;
}

L();popTS();UC();RL();d("Ready");

// Tab switching
function ST(n){document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.toggle('active',b.dataset.tab===n)});document.querySelectorAll('.tc').forEach(function(e){e.classList.toggle('vh',e.id!=='tab-'+n)});if(n==='list')RL();if(n==='quiz')IQ()}
document.querySelectorAll('.tab-bar button').forEach(function(b){b.onclick=function(){ST(b.dataset.tab)}});d('Tabs ready');
// Word list
function RL(){var swEl=document.getElementById('sw'),ftEl=document.getElementById('ft');if(!swEl||!ftEl)return;var q=(swEl.value||'').trim().toLowerCase(),ft=ftEl.value;var f=words;if(q)f=words.filter(function(w){return w.word.toLowerCase().includes(q)||w.meaning.includes(q)});if(ft)f=f.filter(function(w){return w.tag===ft});var c=document.getElementById('wl');if(!f.length){c.innerHTML='<div style="text-align:center;padding:60px 20px;color:#6b7280"><p>'+(words.length?'no match':'no words')+'</p></div>';return}c.innerHTML=f.map(function(w){var d2=new Date(w.createdAt),ds=(d2.getMonth()+1)+'/'+d2.getDate()+' '+String(d2.getHours()).padStart(2,'0')+':'+String(d2.getMinutes()).padStart(2,'0');var ph=w.phonetic?' <span class="wc-p">'+esc(w.phonetic)+'</span>':'';var ex='';if(w.examples&&w.examples.length)ex='<div class="wc-e">'+esc(w.examples[0].text)+(w.examples[0].cn?'<br><span>'+esc(w.examples[0].cn)+'</span>':'')+'</div>';return '<div class="wc"><div class="wm"><div class="wc-w">'+esc(w.word)+ph+'</div><div class="wc-m">'+esc(w.meaning)+'</div>'+ex+'<div class="wc-meta"><span class="wc-t" onclick="editTag("'+w.id+'")">'+esc(w.tag||'other')+'</span><span class="wc-time">'+ds+'</span>'+(w.phonetic?'<span class="wc-time" onclick="spkW("'+w.id+'")">\u266a</span>':'')+'</div></div><button class="sec sm" onclick="delW("'+w.id+'")">X</button></div>'}).join('')}
document.getElementById('sw').oninput=RL;document.getElementById('ft').onchange=RL;
function spkW(id){var w=words.find(function(x){return x.id===id});if(!w||!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w.word);u.lang='en-US';u.rate=0.85;window.speechSynthesis.speak(u)}
function delW(id){if(!confirm('Delete?'))return;words=words.filter(function(w){return w.id!==id});S();RL();UC()}
function editTag(id){var w=words.find(function(x){return x.id===id});if(!w)return;var nt=prompt('Tag:',w.tag);if(nt&&nt.trim()){w.tag=nt.trim();if(!tags.includes(w.tag)){tags.push(w.tag);popTS()}S();RL()}}
// Quiz
window._qq=[];window._qi=0;
function IQ(){var qtEl=document.getElementById('qt');if(!qtEl)return;var ft=qtEl.value,p=ft?words.filter(function(w){return w.tag===ft}):words;if(!p.length){document.getElementById('qc').style.display='none';document.getElementById('qe').style.display='block';return}document.getElementById('qe').style.display='none';document.getElementById('qc').style.display='block';if(!window._qq.length)RQ()}
document.getElementById('qstart').onclick=RQ;
function RQ(){var qtEl=document.getElementById('qt');if(!qtEl)return;var ft=qtEl.value,p=ft?words.filter(function(w){return w.tag===ft}):words;window._qq=[].concat(p).sort(function(){return Math.random()-0.5});window._qi=0;document.getElementById('qr').textContent='';document.getElementById('qa').value='';document.getElementById('qa').disabled=false;if(!window._qq.length){document.getElementById('qe').style.display='block';document.getElementById('qc').style.display='none';return}showQ()}
function showQ(){var q=window._qq[window._qi];if(!q){RQ();return}var mm=document.getElementById('qmode').checked;document.getElementById('qq').textContent=mm?q.meaning:q.word;document.getElementById('qi').textContent=(window._qi+1)+'/'+window._qq.length+(q.phonetic&&!mm?' '+q.phonetic:'');document.getElementById('qa').value='';document.getElementById('qa').disabled=false;document.getElementById('qa').focus();document.getElementById('qr').textContent=''}
document.getElementById('qchk').onclick=checkQ;document.getElementById('qa').onkeydown=function(e){if(e.key==='Enter')checkQ()};
function checkQ(){var q=window._qq[window._qi];if(!q)return;var a=document.getElementById('qa').value.trim().toLowerCase(),mm=document.getElementById('qmode').checked,re=document.getElementById('qr');if(mm?(a===q.word.toLowerCase()):(a===q.meaning)){re.textContent='\u2713 correct'+(q.examples&&q.examples[0]?' ex: '+q.examples[0].text:'');re.style.color='#22c55e';advQ()}else{re.textContent='\u2717 wrong';re.style.color='#ef4444'}}
function advQ(){window._qi++;if(window._qi>=window._qq.length){document.getElementById('qr').textContent='Done!'+window._qq.length;document.getElementById('qa').disabled=true;window._qq=[];return}setTimeout(showQ,600)}
document.getElementById('qans').onclick=function(){var q=window._qq[window._qi];if(!q)return;var mm=document.getElementById('qmode').checked,a=mm?q.word:q.meaning,ex=q.examples&&q.examples[0]?' | '+q.examples[0].text:'';document.getElementById('qr').textContent='> '+(mm?'en: ':'cn: ')+a+ex;setTimeout(function(){advQ()},1200)}
// Tags
function openTM(){renderTG();document.getElementById('tmodal').style.display='block';document.getElementById('nti').value='';document.getElementById('nti').focus()}
function closeTM(){document.getElementById('tmodal').style.display='none'}
function renderTG(){document.getElementById('tg').innerHTML=tags.map(function(t){return'<span style="display:inline-flex;gap:4px;font-size:13px;padding:4px 10px;border-radius:14px;background:rgba(79,110,247,.1);color:#4f6ef7">'+esc(t)+' <span style="cursor:pointer" onclick="rmTG("'+esc(t)+'")">X</span></span>'}).join('')}
function addNT(){var inp=document.getElementById('nti'),n=inp.value.trim();if(!n||tags.includes(n))return;tags.push(n);S();inp.value='';renderTG();popTS()}
function rmTG(n){if(!confirm('Delete tag?'))return;tags=tags.filter(function(t){return t!==n});words.forEach(function(w){if(w.tag===n)w.tag='other'});S();renderTG();popTS();RL()}
// Export
function exp(){var d2=JSON.stringify({words:words,tags:tags},null,2),b=new Blob([d2],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='vocab_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);TM('exported')}
