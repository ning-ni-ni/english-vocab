<div id="tab-list" class="tc vh"><div class="wrap"><div class="row"><input type="text" id="sw" placeholder="搜索..." autocomplete="off"><select id="ft" style="width:auto;padding:8px"><option value="">全部</option></select></div></div><div class="wl" id="wl"></div></div><div id="tab-quiz" class="tc vh"><div class="wrap"><div class="row"><select id="qt" style="flex:1"><option value="">全部词</option></select><button class="pri sm" id="qstart">开始</button></div><label style="font-size:13px"><input type="checkbox" id="qmode"> 看中文拼英文</label></div><div class="wrap" id="qc" style="text-align:center;display:none"><div style="font-size:28px;font-weight:700;margin-bottom:8px" id="qq"></div><div id="qi" style="color:#6b7280;margin-bottom:16px"></div><div class="row" style="max-width:320px;margin:0 auto"><input type="text" id="qa" placeholder="答案..." autocomplete="off"><button class="pri sm" id="qchk">确认</button><button class="sec sm" id="qans">答案</button></div><div id="qr" style="margin-top:12px;min-height:24px"></div></div><div id="qe" style="display:none;padding:60px;text-align:center;color:#6b7280"><p>无单词</p></div></div><div id="tmodal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200"><div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4)" onclick="closeTM()"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;width:90%;max-width:400px;z-index:1;border-radius:10px"><h3>管理标签</h3><div id="tg" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div><input type="text" id="nti" placeholder="新标签" style="flex:1"><button class="pri sm" onclick="addNT()">添加</button><br><button class="sec w100" style="margin-top:12px" onclick="closeTM()">完成</button></div></div>
<div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:100">.</div>
<input type="file" id="impf" accept=".json" style="display:none"><script>
var dbg = document.getElementById("dbg");
function d(m){dbg.style.display="block";dbg.innerHTML+=new Date().toLocaleTimeString()+": "+m+"<br>"}
window.onerror=function(m,u,l){d("ERR: "+m+" ("+u+":"+l+")")}
d("Page loaded");

// Lookup
document.getElementById("btn-lookup").onclick = function() {
  var w = document.getElementById("input-word").value.trim().toLowerCase();
  d("Click: '" + w + "'");
  if (!w) return;
  lookupWord(w);
};

document.getElementById("input-word").oninput = function() {
  clearTimeout(window._timer);
  var v = this.value.trim();
  if (v.length < 2) return;
  window._timer = setTimeout(function() { lookupWord(v); }, 400);
};

async function lookupWord(w) {
  d("lookup: " + w);
  document.getElementById("error").style.display = "none";
  document.getElementById("result").style.display = "none";
  document.getElementById("loading").style.display = "block";

  try {
    d("Fetching dict API...");
    var dr = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(w));
    if (!dr.ok) throw new Error("not_found");
    var dd = await dr.json();
    d("Dict API OK: " + dd[0].word);
    var entry = dd[0];
    var ph = entry.phonetic || (entry.phonetics && entry.phonetics[0] && entry.phonetics[0].text) || "";
    var meanings = entry.meanings || [];

    d("Translating...");
    var cn = "";
    try {
      var tr = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(w) + "&langpair=en|zh-CN");
      var td = await tr.json();
      cn = td.responseData ? td.responseData.translatedText : "";
    } catch(e) { d("Trans err: " + e.message); }

    var defs = [];
    var exs = [];
    var pp = "";
    meanings.forEach(function(m) {
      if (!pp) pp = m.partOfSpeech;
      m.definitions.forEach(function(d) {
        defs.push({pos: m.partOfSpeech, text: d.definition});
        if (d.example && exs.length < 3) exs.push({pos: m.partOfSpeech, text: d.example, cn: ""});
      });
    });

    // Translate examples
    for (var i = 0; i < exs.length; i++) {
      try {
        var tr2 = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(exs[i].text) + "&langpair=en|zh-CN");
        var td2 = await tr2.json();
        exs[i].cn = td2.responseData ? td2.responseData.translatedText : "";
      } catch(e) {}
    }

    d("Displaying result");
    document.getElementById("result-word").textContent = w;
    document.getElementById("result-phonetic").textContent = ph || "";
    document.getElementById("result-pos").textContent = pp || "";
    document.getElementById("meaning-input").value = cn || "";

    // Definitions
    var dc = document.getElementById("def-container");
    if (defs.length) {
      dc.innerHTML = defs.slice(0,2).map(function(d) {
        return '<span style="color:#4f6ef7;font-weight:500;font-size:11px">' + d.pos + '</span> ' + esc(d.text);
      }).join("<br>");
    } else { dc.innerHTML = ""; }

    // Examples
    var ec = document.getElementById("example-container");
    if (exs.length) {
      ec.innerHTML = exs.map(function(x) {
        return '<div class="example"><div class="en">' + esc(x.text) + '</div>' + (x.cn ? '<div class="cn">' + esc(x.cn) + '</div>' : "") + '</div>';
      }).join("");
    } else {
      ec.innerHTML = '<div style="font-size:13px;color:#6b7280;padding:4px 0">暂未找到例句</div>';
    }

    window._lookup = {word: w, phonetic: ph, pos: pp, defs: defs, examples: exs};
    document.getElementById("result").style.display = "block";
    d("Done");
  } catch(e) {
    d("Error: " + e.message);
    document.getElementById("error-text").textContent = e.message === "not_found" ? "没找到这个单词，试试检查拼写" : "查询出错: " + e.message;
    document.getElementById("error").style.display = "block";
  }
  document.getElementById("loading").style.display = "none";
}

// Speech
document.getElementById("btn-sound-gb").onclick = function() { speakWord("en-GB"); };
document.getElementById("btn-sound-us").onclick = function() { speakWord("en-US"); };

function speakWord(accent) {
  var w = document.getElementById("result-word").textContent || (window._lookup && window._lookup.word);
  if (!w || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  window.speechSynthesis.cancel();
  var d = new SpeechSynthesisUtterance(" ");
  d.volume = 0;
  window.speechSynthesis.speak(d);
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);
  u.lang = accent; u.rate = 0.9; u.volume = 1;
  var v = window.speechSynthesis.getVoices();
  if (v.length > 0) { for (var i = 0; i < v.length; i++) { if (v[i].lang.indexOf(accent.split("-")[0]) === 0) { u.voice = v[i]; break; } } }
  window.speechSynthesis.speak(u);
}
function speak(accent) { speakWord(accent); }

// Save
document.getElementById("btn-save").onclick = function() {
  var w = document.getElementById("result-word").textContent;
  var m = document.getElementById("meaning-input").value.trim();
  if (!w || !m) return;
  alert("Saving: " + w + " - " + m);
};

function esc(s) {
  var d2 = document.createElement("div");
  d2.textContent = s;
  return d2.innerHTML;
}

d("Ready");
var SK='eng_voc',TK='eng_voc_tags',words=[],tags=['副词','形容词','动词','名词','短语','其他'];
function S(){localStorage.setItem(SK,JSON.stringify(words));localStorage.setItem(TK,JSON.stringify(tags))}
function L(){try{var r=localStorage.getItem(SK);words=r?JSON.parse(r):[]}catch(e){}try{var r=localStorage.getItem(TK);if(r)tags=JSON.parse(r)}catch(e){}}
function UC(){var e=document.getElementById('cnt');if(e)e.textContent=words.length+'个词'}
function TM(s){var e=document.getElementById('toast');if(e){e.textContent=s;e.style.opacity='1';clearTimeout(e._t);e._t=setTimeout(function(){e.style.opacity='0'},1800)}}
function popTS(){['ft','qt'].forEach(function(id,i){var s=document.getElementById(id);if(!s)return;var c=s.value;s.innerHTML='<option value="">'+(i?'全部词':'全部')+'</option>';tags.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o)});if(tags.includes(c))s.value=c})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ST(n){document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.toggle('active',b.dataset.tab===n)});document.querySelectorAll('.tc').forEach(function(e){e.classList.toggle('vh',e.id!=='tab-'+n)});if(n==='list')RL();if(n==='quiz')IQ()}
document.querySelectorAll('.tab-bar button').forEach(function(b){b.onclick=function(){ST(b.dataset.tab)}});d('Tabs');
function RL(){var el=document.getElementById('sw');if(!el)return;var q=el.value.trim().toLowerCase(),fl=document.getElementById('ft'),fv=fl?fl.value:'';var f=words;if(q)f=words.filter(function(w){return w.word.toLowerCase().includes(q)||w.meaning.includes(q)});if(fv)f=f.filter(function(w){return w.tag===fv});var c=document.getElementById('wl');if(!c)return;if(!f.length){c.innerHTML='<div style="text-align:center;padding:60px;color:#6b7280"><p>'+(words.length?'无匹配':'无生词')+'</p></div>';return}c.innerHTML=f.map(function(w){var d2=new Date(w.createdAt),ds=(d2.getMonth()+1)+'/'+d2.getDate()+' '+String(d2.getHours()).padStart(2,'0')+':'+String(d2.getMinutes()).padStart(2,'0');var pr=w.phonetic?' <span class="wc-p">'+esc(w.phonetic)+'</span>':'';var ex='';if(w.examples&&w.examples.length)ex='<div class="wc-e">'+esc(w.examples[0].text)+(w.examples[0].cn?'<br>'+esc(w.examples[0].cn):'')+'</div>';var sid=JSON.stringify(w.id);return '<div class="wc"><div class="wm"><div class="wc-w">'+esc(w.word)+pr+'</div><div class="wc-m">'+esc(w.meaning)+'</div>'+ex+'<div class="wc-meta"><span class="wc-t" onclick="et('+sid+')">'+esc(w.tag||'其他')+'</span><span class="wc-time">'+ds+'</span></div></div><button class="sec sm" onclick="dw('+sid+')">X</button></div>'}).join('')}
var _sw=document.getElementById('sw');if(_sw)_sw.oninput=RL;var _ft=document.getElementById('ft');if(_ft)_ft.onchange=RL;
function dw(id){if(!confirm('删除?'))return;words=words.filter(function(w){return w.id!==id});S();RL();UC()}
function et(id){var w=words.find(function(x){return x.id===id});if(!w)return;var nt=prompt('标签:',w.tag);if(nt&&nt.trim()){w.tag=nt;if(!tags.includes(w.tag)){tags.push(w.tag);popTS()}S();RL()}}
window._qq=[];window._qi=0;
function IQ(){var el=document.getElementById('qt');if(!el)return;var ft=el.value,p=ft?words.filter(function(w){return w.tag===ft}):words;if(!p.length){var qe=document.getElementById('qe');if(qe)qe.style.display='block';var qc=document.getElementById('qc');if(qc)qc.style.display='none';return}var qe=document.getElementById('qe');if(qe)qe.style.display='none';var qc=document.getElementById('qc');if(qc)qc.style.display='block';if(!window._qq.length){RQ()}}
var _qs=document.getElementById('qstart');if(_qs)_qs.onclick=RQ;var _qm=document.getElementById('qmode');if(_qm)_qm.onchange=RQ;
function RQ(){var el=document.getElementById('qt');if(!el)return;var ft=el.value,p=ft?words.filter(function(w){return w.tag===ft}):words;window._qq=[].concat(p).sort(function(){return Math.random()-0.5});window._qi=0;var qr=document.getElementById('qr');if(qr)qr.textContent='';var qa=document.getElementById('qa');if(qa){qa.value='';qa.disabled=false}if(!window._qq.length){var qe=document.getElementById('qe');if(qe)qe.style.display='block';var qc=document.getElementById('qc');if(qc)qc.style.display='none';return}showQ()}
function showQ(){var q=window._qq[window._qi];if(!q)return;var mm=document.getElementById('qmode')?document.getElementById('qmode').checked:false;var qq=document.getElementById('qq');if(qq)qq.textContent=mm?q.meaning:q.word;var qi=document.getElementById('qi');if(qi)qi.textContent=(window._qi+1)+'/'+window._qq.length+(q.phonetic&&!mm?' '+q.phonetic:'');var qa=document.getElementById('qa');if(qa){qa.value='';qa.disabled=false;qa.focus()}var qr=document.getElementById('qr');if(qr)qr.textContent=''}
var _qc=document.getElementById('qchk');if(_qc)_qc.onclick=ck;var _qa=document.getElementById('qa');if(_qa)_qa.onkeydown=function(e){if(e.key==='Enter')ck()}
function ck(){var q=window._qq[window._qi];if(!q)return;var a=document.getElementById('qa');var a2=a?a.value.trim().toLowerCase():'';var mm=document.getElementById('qmode')?document.getElementById('qmode').checked:false;var re=document.getElementById('qr');if(!re)return;if(mm?a2===q.word.toLowerCase():a2===q.meaning){re.textContent='✓'+(q.examples&&q.examples[0]?' '+q.examples[0].text:'');re.style.color='green';advQ()}else{re.textContent='✗';re.style.color='red'}}
function advQ(){window._qi++;if(window._qi>=window._qq.length){var re=document.getElementById('qr');if(re)re.textContent='★ Done!';var qa=document.getElementById('qa');if(qa)qa.disabled=true;window._qq=[];return}setTimeout(showQ,600)}
var _qans=document.getElementById('qans');if(_qans)_qans.onclick=function(){var q=window._qq[window._qi];if(!q)return;var mm=document.getElementById('qmode')?document.getElementById('qmode').checked:false;var a=mm?q.word:q.meaning;var ex=q.examples&&q.examples[0]?' | '+q.examples[0].text:'';var re=document.getElementById('qr');if(re)re.textContent='> '+(mm?'en: ':'cn: ')+a+ex;setTimeout(function(){advQ()},1200)}
function openTM(){document.getElementById('tmodal').style.display='block';var tg=document.getElementById('tg');if(tg)tg.innerHTML=tags.map(function(t){return'<span style="display:inline-flex;gap:4px;font-size:13px;padding:4px 10px;border-radius:14px;background:rgba(79,110,247,.1);color:#4f6ef7">'+esc(t)+' X</span>'}).join('');document.getElementById('nti').value='';document.getElementById('nti').focus()}
function closeTM(){document.getElementById('tmodal').style.display='none'}
function addNT(){var inp=document.getElementById('nti');if(!inp)return;var n=inp.value.trim();if(!n||tags.includes(n))return;tags.push(n);S();inp.value='';popTS()}
function exp(){var d2=JSON.stringify({words:words,tags:tags},null,2);var b2=new Blob([d2],{type:'application/json'});var u2=URL.createObjectURL(b2);var a2=document.createElement('a');a2.href=u2;a2.download='vocab_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a2);a2.click();document.body.removeChild(a2);URL.revokeObjectURL(u2);TM('导出')}
function imp(e){var f=e.target.files[0];if(!f)return;var r2=new FileReader();r2.onload=function(ev){try{var d2=JSON.parse(ev.target.result);if(!d2.words)throw Error();var ids={};words.forEach(function(w){ids[w.id]=1});var n=0;d2.words.forEach(function(w){if(!ids[w.id]){words.push(w);ids[w.id]=1;n++}});if(d2.tags)d2.tags.forEach(function(t){if(!tags.includes(t))tags.push(t)});S();popTS();RL();UC();TM('导入'+n)}catch(ex){TM('失败')}};r2.readAsText(f)}
document.getElementById('btn-save').onclick=function(){var w=document.getElementById('result-word').textContent,m=document.getElementById('meaning-input').value.trim();if(!w||!m){TM('请先查词');return}var lk=window._lookup;if(lk&&lk.word===w){words.unshift({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:lk.phonetic||'',pos:lk.pos||'',tag:'其他',examples:(lk.examples||[]).map(function(e){return{text:e.text,cn:e.cn||''}}),createdAt:Date.now()})}else{words.unshift({id:Date.now()+'_'+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:'',pos:'',tag:'其他',examples:[],createdAt:Date.now()})}S();document.getElementById('result-word').textContent='';document.getElementById('meaning-input').value='';document.getElementById('result').style.display='none';UC();TM('已保存')}
