<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语生词本</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;font-size:16px;line-height:1.5;background:#f5f5f5;color:#1a1a2e;max-width:600px;margin:0 auto;padding:16px;min-height:100dvh}
  @media(prefers-color-scheme:dark){body{background:#111118;color:#e8e8ed}}
  .wrap{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
  @media(prefers-color-scheme:dark){.wrap{background:#1a1a25;box-shadow:0 1px 3px rgba(0,0,0,.3)}}
  h1{font-size:20px;margin-bottom:8px}
  .row{display:flex;gap:8px}
  .row input{flex:1;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;outline:none;width:100%;background:#f5f5f5;color:#1a1a2e;font-family:inherit}
  .row input:focus{border-color:#4f6ef7}
  @media(prefers-color-scheme:dark){.row input{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
  button{padding:10px 18px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;white-space:nowrap}
  button.primary{background:#4f6ef7;color:#fff}
  button.secondary{background:transparent;color:#6b7280;border:1.5px solid #e5e7eb}
  @media(prefers-color-scheme:dark){button.secondary{color:#9ca3af;border-color:#2a2a38}}
  button:active{transform:scale(0.97)}
  #dbg{display:none;background:#ffe;color:#000;padding:8px;font-size:13px;white-space:pre-wrap;border-radius:6px;margin-bottom:8px}
  #loading{display:none;text-align:center;padding:32px}
  #error{display:none;text-align:center;padding:24px;color:#6b7280}
  #error .icon{font-size:36px;margin-bottom:8px}
  #result{display:none;margin-top:12px}
  #result .word{font-size:24px;font-weight:700;margin-bottom:4px}
  #result .phonetic{font-size:14px;color:#6b7280;margin-bottom:8px}
  #result .pos{display:inline-block;font-size:12px;padding:3px 10px;border-radius:10px;background:#eef;color:#4f6ef7;margin-bottom:12px}
  #result .section{border-top:1px solid #e5e7eb;padding:12px 0}
  @media(prefers-color-scheme:dark){#result .section{border-color:#2a2a38}}
  #result .label{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px}
  #result .def{padding:6px 0;font-size:13px;color:#6b7280;line-height:1.5}
  #result .def .pos-label{color:#4f6ef7;font-weight:500;font-size:11px}
  #result .example{padding:8px 10px;background:#f5f5f5;border-radius:6px;margin-bottom:6px;line-height:1.5}
  @media(prefers-color-scheme:dark){#result .example{background:#111118}}
  #result .example .en{font-size:14px;font-style:italic}
  #result .example .cn{font-size:13px;color:#6b7280;margin-top:2px}
  .say-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .say-row button{flex:1;min-width:100px;font-size:14px}
  #meaning-input{padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;font-weight:500;outline:none;width:100%;background:#f5f5f5;color:#1a1a2e;font-family:inherit;margin-top:4px}
  #meaning-input:focus{border-color:#4f6ef7}
  @media(prefers-color-scheme:dark){#meaning-input{background:#111118;color:#e8e8ed;border-color:#2a2a38}}
  #result .save-row{display:flex;gap:8px;border-top:1px solid #e5e7eb;padding-top:12px}
  @media(prefers-color-scheme:dark){#result .save-row{border-color:#2a2a38}}
  #result .save-row button{flex:1}
  #result .save-row select{flex:0 0 auto;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#f5f5f5;color:#1a1a2e}
  @media(prefers-color-scheme:dark){#result .save-row select{background:#111118;color:#e8e8ed;border-color:#2a2a38}}

.tab-bar{display:flex;gap:0;margin-bottom:16px;background:var(--surface, #fff);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-bar button{flex:1;background:transparent;border:none;font-size:14px;font-weight:500;padding:12px;color:var(--text-secondary, #6b7280);cursor:pointer;position:relative}
.tab-bar button.active{color:var(--primary, #4f6ef7);font-weight:600}
.tab-bar button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary,#4f6ef7);border-radius:3px 3px 0 0}
.view-hidden{display:none !important}
.word-list{display:flex;flex-direction:column;gap:8px;flex:1}
.word-card{background:var(--surface,#fff);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px;animation:fadeIn .25s ease}
.word-card .wm{flex:1;min-width:0}
.wc-word{font-size:17px;font-weight:600;word-break:break-word}
.wc-ph{font-size:13px;color:var(--text-secondary,#6b7280);font-weight:400;margin-left:4px}
.wc-mn{font-size:14px;color:var(--text-secondary,#6b7280);margin-top:1px;word-break:break-word}
.wc-ex{font-size:13px;margin-top:6px;padding:6px 10px;background:var(--bg,#f5f5f5);border-radius:6px;line-height:1.4;word-break:break-word;font-style:italic}
.wc-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.wc-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;background:rgba(79,110,247,.1);color:var(--primary,#4f6ef7);cursor:pointer}
.wc-time{font-size:11px;color:var(--text-secondary,#6b7280)}
.btn-sm{padding:6px 10px;min-height:36px;font-size:13px}
@media(prefers-color-scheme:dark){.tab-bar{background:#1a1a25}.tab-bar button{color:#9ca3af}.tab-bar button.active{color:#6b83ff}.word-card{background:#1a1a25}.wc-ex{background:#111118}}
</style>
</head>
<body>

<div id="dbg"><input type="file" id="import-file" accept=".json" style="display:none" onchange="impData()"><button class="secondary btn-sm" onclick="expData()" style="float:right;margin-top:-40px">导出</button><button class="secondary btn-sm" onclick="document.getElementById('import-file').click()" style="float:right;margin-top:-40px;margin-right:50px">导入</button></div>
<h1>英语生词本 <span id="count" style="font-size:14px;color:#6b7280;font-weight:400">0 个词</span></h1>


<div class="tab-bar">
  <button class="active" data-tab="add">添加</button>
  <button data-tab="list">词库</button>
  <button data-tab="quiz">测验</button>
</div>

<div id="tab-list" class="view-hidden">
  <div class="wrap"><div class="row" style="margin-bottom:8px">
    <input type="text" id="search-word" placeholder="搜索单词..." autocomplete="off" oninput="renderList()" style="flex:1">
    <select id="filter-tag" onchange="renderList()" style="flex:0;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;outline:none;background:#f5f5f5;color:#1a1a2e;font-size:14px">
      <option value="">全部</option>
    </select>
  </div></div>
  <div class="word-list" id="word-list"></div>
</div>

<div id="tab-quiz" class="view-hidden">
  <div class="wrap">
    <div class="row" style="margin-bottom:8px">
      <select id="quiz-tag" onchange="resetQuiz()" style="flex:1;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;outline:none;background:#f5f5f5;color:#1a1a2e;font-size:14px">
        <option value="">全部词</option>
      </select>
      <button class="primary btn-sm" onclick="resetQuiz()">开始</button>
    </div>
    <label style="font-size:13px;color:#6b7280;display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="quiz-mode" onchange="resetQuiz()"> 看中文拼英文
    </label>
  </div>
  <div id="quiz-card" class="wrap" style="text-align:center;display:none">
    <div style="font-size:28px;font-weight:700;margin-bottom:8px" id="quiz-q"></div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px" id="quiz-info"></div>
    <div class="row" style="max-width:320px;margin:0 auto">
      <input type="text" id="quiz-ans" placeholder="输入答案..." autocomplete="off" onkeydown="if(event.key==='Enter')checkQ()" style="flex:1">
      <button class="primary btn-sm" onclick="checkQ()">确认</button>
      <button class="secondary btn-sm" onclick="showQA()">答案</button>
    </div>
    <div id="quiz-result" style="margin-top:12px;font-size:15px;min-height:24px"></div>
  </div>
  <div id="quiz-empty" style="text-align:center;padding:60px 20px;color:#6b7280">
    <div style="font-size:48px;margin-bottom:12px;opacity:.5">🎯</div>
    <p>没有符合条件的单词</p>
  </div>
</div>

<div id="tag-mgr" class="wrap" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;max-width:400px;width:90%">
  <h3 style="margin-bottom:12px">管理标签</h3>
  <div id="tag-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div>
  <div class="row"><input type="text" id="new-tag" placeholder="新标签名称" onkeydown="if(event.key==='Enter')addTag()" style="flex:1"><button class="primary btn-sm" onclick="addTag()">添加</button></div>
  <button class="secondary" style="margin-top:12px;width:100%" onclick="closeTagMgr()">完成</button>
</div>
<div id="tag-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:199" onclick="closeTagMgr()"></div>

<style>@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}</style>
<div class="wrap" style="gap:8px">
  <div class="row">
    <input type="text" id="input-word" placeholder="输入英语单词..." autocomplete="off">
    <button class="primary" id="btn-lookup">🔍</button>
  </div>
</div>

<div id="loading" class="wrap">
  <div style="width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#4f6ef7;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto"></div>
  <div style="margin-top:8px;color:#6b7280;font-size:14px">正在查询...</div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="error" class="wrap">
  <div class="icon">😕</div>
  <div id="error-text"></div>
</div>

<div id="result">
  <div class="wrap">
    <div id="result-word" class="word"></div>
    <div id="result-phonetic" class="phonetic"></div>
    <div id="result-pos" class="pos"></div>

    <div class="section">
      <div class="label">📖 含义 · 掌握什么</div>
      <input type="text" id="meaning-input" placeholder="中文释义...">
      <div id="def-container" class="def" style="margin-top:6px"></div>
    </div>

    <div class="section">
      <div class="label">💬 用法 · 如何应用</div>
      <div id="example-container"></div>
    </div>

    <div class="section">
      <div class="label">🔊 发音 · 如何说</div>
      <div class="say-row">
        <button class="secondary" id="btn-sound-gb">🇬🇧 英式发音</button>
        <button class="secondary" id="btn-sound-us">🇺🇸 美式发音</button>
      </div>
    </div>

    <div class="save-row">
      <select id="result-tag"><option>其他</option></select>
      <button class="primary" id="btn-save">＋ 记录生词</button>
    </div>
  </div>
</div>

<div id="status"></div>

<script>
var dbg=document.getElementById("dbg"),SKEY='eng_vocab',TKEY='eng_vocab_tags',words=[],tags=['副词','形容词','动词','名词','短语','其他'],quizQ=[],quizI=0;
function d(m){dbg.style.display="block";dbg.innerHTML+=new Date().toLocaleTimeString()+": "+m+"<br>"}
window.onerror=function(m,u,l){d("ERR: "+m+" ("+u+":"+l+")")}
d("Page loaded");
function load(){try{var r=localStorage.getItem(SKEY);words=r?JSON.parse(r):[]}catch(e){}try{var r=localStorage.getItem(TKEY);if(r)tags=JSON.parse(r)}catch(e){}}
function save(){localStorage.setItem(SKEY,JSON.stringify(words));localStorage.setItem(TKEY,JSON.stringify(tags))}
function popTags(){['filter-tag','quiz-tag'].forEach(function(id){var s=document.getElementById(id);if(!s)return;var c=s.value;s.innerHTML='<option value="">'+(id==='filter-tag'?'全部':'全部词')+'</option>';tags.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o)});if(tags.includes(c))s.value=c})}
function t(m){d("Toast: "+m)}
function switchTab(n){document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.toggle('active',b.dataset.tab===n)});['tab-add','tab-list','tab-quiz'].forEach(function(i){var el=document.getElementById(i);if(el)el.classList.toggle('view-hidden',i!=='tab-'+n)});if(n==='list')renderList();if(n==='quiz')initQ()}
document.querySelectorAll('.tab-bar button').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab)}});
d("Switched tabs ready");

// Lookup
document.getElementById("btn-lookup").onclick=function(){var w=document.getElementById("input-word").value.trim().toLowerCase();if(w)lookupWord(w)};
document.getElementById("input-word").oninput=function(){clearTimeout(window._tm);var v=this.value.trim();if(v.length>=2)window._tm=setTimeout(function(){lookupWord(v)},400)};

async function lookupWord(w){
  d("lookup: "+w);
  document.getElementById("error").style.display="none";
  document.getElementById("result").style.display="none";
  document.getElementById("loading").style.display="block";
  try{
    var dr=await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(w));
    if(!dr.ok)throw Error("nf");
    var dd=await dr.json();d("Dict OK: "+dd[0].word);
    var e=dd[0],ph=e.phonetic||(e.phonetics&&e.phonetics.find(function(p){return p.text})?e.phonetics.find(function(p){return p.text}).text:'')||'',mn=e.meanings||[];
    var cn="";try{var tr=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(w)+"&langpair=en|zh-CN");var td=await tr.json();cn=td.responseData?td.responseData.translatedText:""}catch(ex){d("Trans err: "+ex.message)}
    var dfs=[],exs=[],pp="";
    mn.forEach(function(m){if(!pp)pp=m.partOfSpeech;m.definitions.forEach(function(d){dfs.push({pos:m.partOfSpeech,text:d.definition});if(d.example&&exs.length<3)exs.push({pos:m.partOfSpeech,text:d.example,cn:""})})});
    for(var i=0;i<exs.length;i++){try{var t2=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(exs[i].text)+"&langpair=en|zh-CN");var td2=await t2.json();exs[i].cn=td2.responseData?td2.responseData.translatedText:""}catch(ex){}}
    d("Display");
    document.getElementById("result-word").textContent=w;
    document.getElementById("result-phonetic").textContent=ph||"";
    document.getElementById("result-pos").textContent=pp||"";
    document.getElementById("meaning-input").value=cn||"";
    var dc=document.getElementById("def-container");
    dc.innerHTML=dfs.length?dfs.slice(0,2).map(function(d){return '<span style="color:#4f6ef7;font-weight:500;font-size:11px">'+d.pos+'</span> '+esc(d.text)}).join("<br>"):"";
    var ec=document.getElementById("example-container");
    ec.innerHTML=exs.length?exs.map(function(x){return '<div class="example"><div class="en">'+esc(x.text)+'</div>'+(x.cn?'<div class="cn">'+esc(x.cn)+'</div>':"")+'</div>'}).join(""):'<div style="font-size:13px;color:#6b7280;padding:4px 0">暂未找到例句</div>';
    window._lk={word:w,phonetic:ph,pos:pp,defs:dfs,examples:exs};
    // Auto-tag
    var pm={adverb:'副词',adjective:'形容词',verb:'动词',noun:'名词',phrase:'短语',preposition:'介词',conjunction:'连词',pronoun:'代词',interjection:'感叹词',determiner:'限定词',numeral:'数词'};
    var sg=pm[pp]||(mn[0]?pm[mn[0].partOfSpeech]:"")||"其他";
    document.getElementById("result").style.display="block";d("Done")
  }catch(e){d("Err: "+e.message);document.getElementById("error-text").textContent=e.message==="nf"?"没有找到这个词":"查询出错: "+e.message;document.getElementById("error").style.display="block"}
  document.getElementById("loading").style.display="none"
}

// Sound
document.getElementById("btn-sound-gb").onclick=function(){speak("en-GB")};
document.getElementById("btn-sound-us").onclick=function(){speak("en-US")};
function speak(a){var w=document.getElementById("result-word").textContent||(window._lk&&window._lk.word);if(!w||!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang=a;u.rate=0.85;window.speechSynthesis.speak(u)}

// Save
document.getElementById("btn-save").onclick=function(){
  var w=document.getElementById("result-word").textContent,m=document.getElementById("meaning-input").value.trim();
  if(!w||!m){d("No word or meaning");return}
  var lk=window._lk;
  if(lk&&lk.word===w){
    var ex=lk.examples||[];
    words.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:lk.phonetic||'',pos:lk.pos||'',examples:ex.map(function(e){return{text:e.text,cn:e.cn||""}}),tag:"其他",createdAt:Date.now()})
  }else{
    words.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,6),word:w,meaning:m,phonetic:"",pos:"",examples:[],tag:"其他",createdAt:Date.now()})
  }
  save();document.getElementById("input-word").value="";document.getElementById("result").style.display="none";document.getElementById("meaning-input").value="";document.getElementById("result-word").textContent="";updateCount();d("Saved: "+w)
};

// Render list
function renderList(){
  var q=(document.getElementById("search-word").value||"").trim().toLowerCase(),ft=document.getElementById("filter-tag").value;
  var f=words;if(q)f=words.filter(function(w){return w.word.toLowerCase().includes(q)||w.meaning.includes(q)});if(ft)f=f.filter(function(w){return w.tag===ft});
  var c=document.getElementById("word-list");
  if(!f.length){c.innerHTML='<div style="text-align:center;padding:60px 20px;color:#6b7280"><div style="font-size:48px;margin-bottom:12px;opacity:.5">📖</div><p>'+(words.length?"没有匹配的单词":"还没有生词，去添加一些吧")+'</p></div>';return}
  c.innerHTML=f.map(function(w){
    var d2=new Date(w.createdAt),ds=(d2.getMonth()+1)+"/"+d2.getDate()+" "+String(d2.getHours()).padStart(2,"0")+":"+String(d2.getMinutes()).padStart(2,"0");
    var ph=w.phonetic?'<span class="wc-ph">'+esc(w.phonetic)+"</span>":"";
    var ex="";if(w.examples&&w.examples.length)ex='<div class="wc-ex">'+esc(w.examples[0].text)+(w.examples[0].cn?'<br><span style="font-style:normal">'+esc(w.examples[0].cn)+"</span>":"")+"</div>";
    return '<div class="word-card"><div class="wm"><div class="wc-word">'+esc(w.word)+ph+'</div><div class="wc-mn">'+esc(w.meaning)+"</div>"+ex+'<div class="wc-meta"><span class="wc-tag">'+esc(w.tag||"其他")+'</span><span class="wc-time">'+ds+'</span>'+(w.phonetic?'<span class="wc-time" style="cursor:pointer" onclick="speakWord(''+w.id+'')">🔊</span>':"")+'</div></div><button class="secondary btn-sm" onclick="delWord(''+w.id+'')">✕</button></div>'
  }).join("")
}

function speakWord(id){var w=words.find(function(x){return x.id===id});if(!w||!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w.word);u.lang="en-US";u.rate=0.85;window.speechSynthesis.speak(u)}
function delWord(id){if(!confirm("确定删除?"))return;words=words.filter(function(w){return w.id!==id});save();renderList();updateCount()}
function updateCount(){var el=document.getElementById("count");if(el)el.textContent=words.length+" 个词"}
function esc(s){var d2=document.createElement("div");d2.textContent=s;return d2.innerHTML}

// Quiz
function initQ(){var ft=document.getElementById("quiz-tag").value,p=ft?words.filter(function(w){return w.tag===ft}):words;if(!p.length){document.getElementById("quiz-card").style.display="none";document.getElementById("quiz-empty").style.display="block";return}document.getElementById("quiz-empty").style.display="none";document.getElementById("quiz-card").style.display="block";if(!quizQ.length)resetQuiz()}
function resetQuiz(){var ft=document.getElementById("quiz-tag").value,p=ft?words.filter(function(w){return w.tag===ft}):words;quizQ=[].concat(p).sort(function(){return Math.random()-0.5});quizI=0;document.getElementById("quiz-result").textContent="";document.getElementById("quiz-ans").value="";document.getElementById("quiz-ans").disabled=false;if(!quizQ.length){document.getElementById("quiz-empty").style.display="block";document.getElementById("quiz-card").style.display="none";return}showQC()}
function showQC(){var q=quizQ[quizI];if(!q){resetQuiz();return}var mm=document.getElementById("quiz-mode").checked;document.getElementById("quiz-q").textContent=mm?q.meaning:q.word;document.getElementById("quiz-info").textContent=(quizI+1)+"/"+quizQ.length+(q.phonetic&&!mm?" "+q.phonetic:"");document.getElementById("quiz-ans").value="";document.getElementById("quiz-ans").disabled=false;document.getElementById("quiz-ans").focus();document.getElementById("quiz-result").textContent=""}
function checkQ(){var q=quizQ[quizI];if(!q)return;var a=document.getElementById("quiz-ans").value.trim().toLowerCase(),mm=document.getElementById("quiz-mode").checked,re=document.getElementById("quiz-result");if(mm?(a===q.word.toLowerCase()):(a===q.meaning)){re.textContent="✓ 正确"+(q.examples&&q.examples[0]?" 例: "+q.examples[0].text:"");re.style.color="#22c55e";advQ()}else{re.textContent="✗ 不对";re.style.color="#ef4444"}}
function advQ(){quizI++;if(quizI>=quizQ.length){document.getElementById("quiz-result").textContent="🎉 完成! "+quizQ.length+" 个";document.getElementById("quiz-ans").disabled=true;quizQ=[];return}setTimeout(showQC,600)}
function showQA(){var q=quizQ[quizI];if(!q)return;var mm=document.getElementById("quiz-mode").checked,a=mm?q.word:q.meaning,ex=q.examples&&q.examples[0]?" | "+q.examples[0].text:"";document.getElementById("quiz-result").textContent="💡 "+(mm?"英文: ":"释义: ")+a+ex;setTimeout(function(){advQ()},1200)}

// Tags
function openTagMgr(){renderTags();document.getElementById("tag-mgr").style.display="block";document.getElementById("tag-overlay").style.display="block"}
function closeTagMgr(){document.getElementById("tag-mgr").style.display="none";document.getElementById("tag-overlay").style.display="none"}
function renderTags(){document.getElementById("tag-list").innerHTML=tags.map(function(t){return'<span style="display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:4px 10px;border-radius:14px;background:rgba(79,110,247,.1);color:var(--primary,#4f6ef7)">'+esc(t)+' <span style="cursor:pointer;opacity:.6" onclick="rmTag(''+esc(t)+'')">✕</span></span>'}).join("")}
function addTag(){var inp=document.getElementById("new-tag"),n=inp.value.trim();if(!n||tags.includes(n))return;tags.push(n);save();inp.value="";renderTags();popTags()}
function rmTag(n){if(!confirm('删除 "'+n+'"?'))return;tags=tags.filter(function(t){return t!==n});words.forEach(function(w){if(w.tag===n)w.tag="其他"});save();renderTags();popTags();renderList()}

// Export/Import
function expData(){var d2=JSON.stringify({words:words,tags:tags},null,2),b=new Blob([d2],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download="生词本_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function impData(){var f=document.getElementById("import-file");if(!f.files[0])return;var r=new FileReader();r.onload=function(e){try{var d2=JSON.parse(e.target.result);if(!d2.words)throw Error();var ids={};words.forEach(function(w){ids[w.id]=1});var n=0;d2.words.forEach(function(w){if(!ids[w.id]){words.push(w);ids[w.id]=1;n++}});if(d2.tags)d2.tags.forEach(function(t){if(!tags.includes(t))tags.push(t)});save();popTags();renderList();updateCount();d("Imported "+n+" words")}catch(ex){d("Import failed")}};r.readAsText(f.files[0]);f.value=""}

// Init
load();popTags();updateCount();renderList();d("Ready");
</script>
</body>
</html>
